name: Auto IPTV Scraper

on:
  schedule:
    - cron: '0 * * * *'  # Proti 1 ghonta por por auto run hobe (Token fresh rakhar jonno)
  workflow_dispatch:     # Manual run korar button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytz
        pip install -r requirements.txt

    - name: Run Scraper Script
      run: |
        python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        git add playlist.m3u
        git commit -m "Auto updated IPTV links with new tokens" || echo "No changes to commit"
        git push
